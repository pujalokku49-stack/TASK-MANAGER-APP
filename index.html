<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task Manager App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Optional: Bootstrap for quick styling -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="text-center mb-4">Task Manager App</h1>

    <!-- Add / Edit form -->
    <div class="card mb-3">
      <div class="card-body">
        <form id="task-form" class="row g-3">
          <div class="col-md-5">
            <label for="title" class="form-label">Task Title</label>
            <input type="text" id="title" class="form-control" required />
          </div>
          <div class="col-md-5">
            <label for="description" class="form-label">Description (optional)</label>
            <input type="text" id="description" class="form-control" />
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100" id="submit-btn">
              Add Task
            </button>
          </div>
          <!-- Hidden field to know when we are editing -->
          <input type="hidden" id="task-id" />
        </form>
      </div>
    </div>

    <!-- Filter / stats -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <button class="btn btn-outline-secondary btn-sm" data-filter="all">All</button>
        <button class="btn btn-outline-secondary btn-sm" data-filter="pending">Pending</button>
        <button class="btn btn-outline-secondary btn-sm" data-filter="completed">Completed</button>
      </div>
      <div id="stats" class="small text-muted"></div>
    </div>

    <!-- Task list -->
    <div class="card">
      <div class="card-body">
        <ul id="task-list" class="list-group list-group-flush">
          <!-- Tasks will be injected here by JS -->
        </ul>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
